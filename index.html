      padding: 16px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    label {
      font-weight: bold;
    }

    select, input, button {
      padding: 8px 12px;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;

      background: #1d4ed8;

    #status {
      margin: 12px 0;

    .result-section {
      margin-top: 20px;
      display: grid;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #grid {
      display: inline-grid;
      gap: 2px;
      margin-top: 12px;
    }

    .cell {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      font-weight: bold;
      border-radius: 4px;
      user-select: none;
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .word-chip {
      padding: 6px 10px;
      background: #e5e7eb;
      border-radius: 999px;
      font-size: 14px;
    }

    .not-placed {
      background: #fee2e2;
    }

    .meta {
      font-size: 14px;
      color: #555;
      margin-top: 8px;
    }
  </style>
</head>
